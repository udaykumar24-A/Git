<!DOCTYPE html>
<html lang="en">
<head>
    {% load static %}
    <meta charset="UTF-8">
    <title>{% block title %}Job Tracker{% endblock %}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            margin: 0;
            background: #0f172a;
            color: #e5e7eb;
        }
        a { color: #38bdf8; text-decoration: none; }
        a:hover { text-decoration: underline; }
        .navbar {
            background: #020617;
            border-bottom: 1px solid #1f2937;
            padding: 0.75rem 1.5rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .navbar-title {
            font-weight: 600;
            color: #e5e7eb;
        }
        .container {
            max-width: 960px;
            margin: 2rem auto;
            padding: 0 1rem;
        }
        .card {
            background: #020617;
            border-radius: 0.75rem;
            padding: 1.5rem;
            box-shadow: 0 10px 25px rgba(15, 23, 42, 0.7);
            border: 1px solid #1f2937;
        }
        .btn {
            display: inline-block;
            padding: 0.5rem 1rem;
            border-radius: 9999px;
            border: none;
            cursor: pointer;
            font-size: 0.9rem;
        }
        .btn-primary {
            background: linear-gradient(to right, #38bdf8, #6366f1);
            color: #0b1120;
        }
        .btn-primary:hover {
            opacity: 0.9;
        }
        .btn-ghost {
            background: transparent;
            color: #9ca3af;
        }
        .btn-ghost:hover {
            background: #020617;
        }
        .stats {
            display: flex;
            gap: 1rem;
            margin-bottom: 1.25rem;
            flex-wrap: wrap;
        }
        .stat {
            flex: 1 1 120px;
            padding: 0.75rem 1rem;
            border-radius: 0.75rem;
            background: #0b1120;
            border: 1px solid #1f2937;
        }
        .stat-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: #9ca3af;
        }
        .stat-value {
            font-size: 1.5rem;
            font-weight: 600;
            margin-top: 0.25rem;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 0.75rem;
        }
        th, td {
            padding: 0.6rem 0.5rem;
            text-align: left;
            border-bottom: 1px solid #111827;
            font-size: 0.9rem;
        }
        th {
            color: #9ca3af;
            font-weight: 500;
        }
        tr:hover td {
            background: rgba(148, 163, 184, 0.04);
        }
        .status-pill {
            display: inline-flex;
            align-items: center;
            padding: 0.15rem 0.6rem;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 500;
        }
        .status-applied {
            background: rgba(56, 189, 248, 0.1);
            color: #38bdf8;
        }
        .status-interview {
            background: rgba(52, 211, 153, 0.1);
            color: #34d399;
        }
        .status-rejected {
            background: rgba(248, 113, 113, 0.1);
            color: #f97373;
        }
        .field {
            margin-bottom: 0.85rem;
        }
        .field label {
            display: block;
            margin-bottom: 0.25rem;
            font-size: 0.9rem;
            color: #d1d5db;
        }
        .field input,
        .field select,
        .field textarea {
            width: 100%;
            padding: 0.5rem 0.6rem;
            border-radius: 0.5rem;
            border: 1px solid #1f2937;
            background: #020617;
            color: #e5e7eb;
        }
        .field input:focus,
        .field select:focus,
        .field textarea:focus {
            outline: 1px solid #38bdf8;
            border-color: #38bdf8;
        }
        .errorlist {
            margin: 0.25rem 0 0.5rem;
            padding: 0;
            list-style: none;
            color: #fecaca;
            font-size: 0.8rem;
        }
        .page-title {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1rem;
        }
        .page-title h1 {
            margin: 0;
            font-size: 1.35rem;
        }
        .muted {
            color: #9ca3af;
            font-size: 0.85rem;
        }
    </style>
    {% block extra_head %}{% endblock %}
</head>
<body>
    <nav class="navbar">
        <div class="navbar-title">Job Tracker</div>
        <div>
            {% if user.is_authenticated %}
                <span class="muted" style="margin-right: 0.75rem;">Hi, {{ user.username }}</span>
                <a href="{% url 'tracker:dashboard' %}" class="btn btn-ghost">Dashboard</a>
                <a href="{% url 'logout' %}" class="btn btn-ghost">Logout</a>
            {% else %}
                <a href="{% url 'login' %}" class="btn btn-ghost">Login</a>
            {% endif %}
        </div>
    </nav>
    <main class="container">
        <div class="card">
            {% block content %}{% endblock %}
        </div>
    </main>
</body>
</html>
